name: publish

# Publishes @camunda8/hub-api-client to npm via OIDC trusted publishing (no npm token; trusted
# publisher = org `camunda`, repo `hub-public-api-client`, workflow `publish.yml`). The spec is
# fetched from camunda-hub and `npm publish` packs the package (`prepack` -> build -> generate from
# the fetched spec), so the tarball is built from that exact spec. Provenance is emitted
# automatically (public repo + package).
#
# Two jobs (npm trusted publishing is bound to THIS workflow file, and a GITHUB_TOKEN push/release
# can't trigger another workflow, so the scheduled auto-publish must live here and publish inline):
#
#   publish       release / manual dispatch -> build at a pinned spec ref and publish the version in
#                 package.json. Used for manual releases and to publish a major after a breaking PR
#                 (below) is merged and a Release is cut.
#   auto-release  scheduled -> diff the current camunda-hub spec against the spec the last published
#                 version was built from (.published-spec-ref) with oasdiff:
#                   no change      -> nothing to do
#                   non-breaking   -> bump a minor, publish, record the new spec ref
#                   breaking       -> open/update a PR (major bump) for human review; do NOT publish
#                 Inert until the repo variable AUTO_PUBLISH_ENABLED is set to 'true'.

on:
  release:
    types: [published]
  schedule:
    - cron: '0 5 * * *' # daily; auto-release only acts when the spec actually changed
  workflow_dispatch:
    inputs:
      job:
        description: Which job to run.
        type: choice
        options: [auto-release, publish]
        default: auto-release
      spec_ref:
        description: '[publish] camunda-hub ref (tag/sha) to build the spec from.'
        required: false
        default: main
      dry_run:
        description: '[auto-release] decide only; do not publish or open a PR.'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    name: publish
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.job == 'publish')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Shared with auto-release so no two publish-capable runs ever overlap (e.g. a release published
    # while a scheduled auto-release is mid-run); queue rather than cancel a run that may be publishing.
    concurrency:
      group: publish-hub-api-client
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate a camunda-hub read token from Vault
        id: app-token
        uses: camunda/infra-global-github-actions/generate-github-app-token-from-vault-secrets@main
        with:
          github-app-id-vault-key: GITHUB_APP_ID
          github-app-id-vault-path: secret/data/products/hub/github.com/apps/camunda/hub-team-automations
          github-app-private-key-vault-key: GITHUB_PRIVATE_KEY
          github-app-private-key-vault-path: secret/data/products/hub/github.com/apps/camunda/hub-team-automations
          vault-auth-method: jwt
          vault-auth-jwt-path: ${{ secrets.VAULT_JWT_PATH }}
          vault-auth-jwt-role: ${{ secrets.VAULT_JWT_ROLE }}
          vault-auth-jwt-audience: ${{ secrets.VAULT_JWT_AUDIENCE }}
          vault-url: ${{ secrets.VAULT_ADDR }}
          # Scope the token to camunda-hub (the repo we read the spec from). Without this,
          # create-github-app-token defaults to the current repo (hub-public-api-client), so the
          # camunda-hub checkout in the next step fails to authenticate (git exit 128).
          owner: camunda
          repositories: camunda-hub

      - name: Fetch the spec (pinned)
        uses: ./.github/actions/fetch-spec
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ inputs.spec_ref || 'main' }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # Trusted publishing needs npm >= 11.5.1.
      - run: npm install -g npm@11.16.0

      - run: npm ci

      - name: Publish to npm
        run: npm publish

  auto-release:
    name: auto-release
    # Inert until explicitly switched on: set repo variable AUTO_PUBLISH_ENABLED=true once the npm
    # trusted publisher is configured and you're ready for hands-off minor publishing.
    # Scheduled and real manual runs require AUTO_PUBLISH_ENABLED=true, but a manual dry-run is always
    # allowed so you can preview the decision *before* enabling (it only decides; every publish/PR step
    # is gated on env.DRY_RUN != 'true').
    if: >-
      (github.event_name == 'schedule' && vars.AUTO_PUBLISH_ENABLED == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'auto-release' &&
        (github.event.inputs.dry_run == 'true' || vars.AUTO_PUBLISH_ENABLED == 'true'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Serialize auto-release runs (schedule overlapping a manual dispatch) and exclude the publish job
    # above via the shared group; queue rather than cancel so a mid-publish run is never interrupted.
    concurrency:
      group: publish-hub-api-client
      cancel-in-progress: false
    permissions:
      contents: write # bump version + update .published-spec-ref on main; push the breaking-change branch
      pull-requests: write # open the breaking-change PR
      id-token: write # Vault JWT (read camunda-hub) + npm OIDC (publish)
    env:
      # dry_run only applies to manual dispatch; scheduled runs always act. Compare the (string)
      # input to 'true' explicitly — a bare `inputs.dry_run` is truthy even when it's the string
      # 'false'. On schedule, github.event.inputs is null, so this is 'false' (act).
      DRY_RUN: ${{ github.event.inputs.dry_run == 'true' }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate a camunda-hub read token from Vault
        id: app-token
        uses: camunda/infra-global-github-actions/generate-github-app-token-from-vault-secrets@main
        with:
          github-app-id-vault-key: GITHUB_APP_ID
          github-app-id-vault-path: secret/data/products/hub/github.com/apps/camunda/hub-team-automations
          github-app-private-key-vault-key: GITHUB_PRIVATE_KEY
          github-app-private-key-vault-path: secret/data/products/hub/github.com/apps/camunda/hub-team-automations
          vault-auth-method: jwt
          vault-auth-jwt-path: ${{ secrets.VAULT_JWT_PATH }}
          vault-auth-jwt-role: ${{ secrets.VAULT_JWT_ROLE }}
          vault-auth-jwt-audience: ${{ secrets.VAULT_JWT_AUDIENCE }}
          vault-url: ${{ secrets.VAULT_ADDR }}
          owner: camunda
          repositories: camunda-hub

      - name: Read the baseline spec ref
        id: baseline
        run: echo "ref=$(cat .published-spec-ref)" >> "$GITHUB_OUTPUT"

      - name: Fetch the baseline spec
        uses: ./.github/actions/fetch-spec
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ steps.baseline.outputs.ref }}
          path: .spec-baseline

      - name: Fetch the current spec
        uses: ./.github/actions/fetch-spec
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          path: .spec-src # default build path, so npm publish -> prepack -> generate uses it

      - name: Record current spec sha
        id: current
        run: echo "sha=$(git -C .spec-src rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install oasdiff (pinned + checksum-verified)
        env:
          OASDIFF_VERSION: 1.21.0
        run: |
          set -euo pipefail
          base="https://github.com/oasdiff/oasdiff/releases/download/v${OASDIFF_VERSION}"
          tarball="oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz"
          tmp="$(mktemp -d)"
          curl -fsSL "${base}/${tarball}" -o "${tmp}/${tarball}"
          curl -fsSL "${base}/checksums.txt" -o "${tmp}/checksums.txt"
          # Verify the tarball against the release checksums before trusting it.
          ( cd "${tmp}" && grep "${tarball}" checksums.txt | sha256sum -c - )
          tar -xzf "${tmp}/${tarball}" -C "${tmp}" oasdiff
          sudo install -m 0755 "${tmp}/oasdiff" /usr/local/bin/oasdiff
          oasdiff --version

      - name: Decide release
        id: decide
        env:
          BASELINE_SPEC: .spec-baseline/restapi/public-api/src/main/resources/openapi/v2/rest-api.yaml
          CURRENT_SPEC: .spec-src/restapi/public-api/src/main/resources/openapi/v2/rest-api.yaml
        run: node scripts/decide-release.mjs

      - name: Summary
        run: |
          {
            echo "**Decision:** \`${{ steps.decide.outputs.decision }}\` (dry-run: \`${DRY_RUN}\`, baseline: \`${{ steps.baseline.outputs.ref }}\`, current: \`${{ steps.current.outputs.sha }}\`)"
            echo
            echo '```'
            cat oasdiff-changelog.md
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.decide.outputs.decision != 'none' && env.DRY_RUN != 'true'
        with:
          node-version: 24.18.0
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm install -g npm@11.16.0
        if: steps.decide.outputs.decision != 'none' && env.DRY_RUN != 'true'

      - run: npm ci
        if: steps.decide.outputs.decision != 'none' && env.DRY_RUN != 'true'

      # --- Non-breaking: bump a minor, publish, then record the new baseline ref ---
      # Publish first: if it fails, nothing is recorded and the next run retries cleanly.
      - name: Publish minor (non-breaking)
        if: steps.decide.outputs.decision == 'minor' && env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          npm version minor --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "${{ steps.current.outputs.sha }}" > .published-spec-ref
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): v${VERSION} (non-breaking spec changes)"
          # Fail BEFORE publishing if we won't be able to record the release at all (e.g. branch
          # protection rejects the push). Otherwise npm would have the version but .published-spec-ref
          # would not advance, and the next run would try to republish and fail on the duplicate.
          git push --dry-run origin HEAD:main
          npm publish
          # main can still advance between the dry-run and here (e.g. a human merge), which would
          # reject a plain push and strand the bump + .published-spec-ref, making the next run
          # republish. Rebase-and-retry so the record always lands; tag only once the commit is on main
          # (rebasing would otherwise leave an annotated tag pointing at the pre-rebase commit).
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              git tag -a "v${VERSION}" -m "v${VERSION}"
              git push origin "v${VERSION}"
              exit 0
            fi
            echo "push to main rejected (attempt ${attempt}); rebasing on origin/main and retrying"
            git fetch origin main
            git rebase origin/main
          done
          echo "::error::Published v${VERSION} to npm but could not record it on main after retries; push .published-spec-ref manually." >&2
          exit 1

      # --- Breaking: open/update a PR (major bump) for human review; do NOT publish ---
      # A fixed branch keeps it to a single, force-updated PR rather than one per run.
      - name: Open breaking-change PR
        if: steps.decide.outputs.decision == 'breaking' && env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          npm version major --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "${{ steps.current.outputs.sha }}" > .published-spec-ref
          BRANCH="auto/breaking-spec-change"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Bring the remote-tracking ref into view (no-op on the first run) so --force-with-lease has
          # something to compare against; without it the lease can't verify and rejects the push.
          git fetch origin "+refs/heads/${BRANCH}:refs/remotes/origin/${BRANCH}" || true
          git checkout -b "$BRANCH"
          git commit -am "chore(release)!: v${VERSION} (BREAKING spec changes)"
          # --force-with-lease (not --force): still rolls the single automation branch forward, but
          # refuses to clobber a remote change we haven't seen (e.g. someone pushed while investigating).
          git push --force-with-lease origin "HEAD:${BRANCH}"
          {
            echo "The camunda-hub public API spec changed in a **breaking** way since the last publish (baseline \`${{ steps.baseline.outputs.ref }}\` → \`${{ steps.current.outputs.sha }}\`)."
            echo
            echo "Review the changes below. **Merging this PR and cutting a GitHub Release** publishes \`v${VERSION}\` (a major). Auto-publish handles non-breaking changes itself; breaking ones route here on purpose."
            echo
            echo "## oasdiff changelog"
            echo
            echo '```'
            cat oasdiff-changelog.md
            echo '```'
          } > pr-body.md
          TITLE="chore(release)!: v${VERSION} — breaking API changes"
          PR_NUMBER="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -z "$PR_NUMBER" ]; then
            gh pr create --base main --head "$BRANCH" --title "$TITLE" --body-file pr-body.md
          else
            gh pr edit "$PR_NUMBER" --title "$TITLE" --body-file pr-body.md
            echo "Updated existing breaking-change PR #${PR_NUMBER}."
          fi
