name: publish

# Publishes @camunda8/hub-public-api-client to npm via OIDC trusted publishing
# (no long-lived npm token). Requires a matching trusted publisher on npmjs.com:
# organization `camunda`, repository `hub-public-api-client`, workflow `publish.yml`.
#
# The spec is fetched from camunda-hub at a pinned ref, then `npm publish` packs
# the package — `prepack` -> build (generate from the fetched spec -> tsc) — so
# the tarball is built from that exact spec commit. Provenance is emitted
# automatically (public repo + package); `access`/`provenance` come from
# publishConfig.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      spec_ref:
        description: camunda-hub ref (tag/sha) to build the spec from.
        required: false
        default: main

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Fetch the spec (pinned)
        uses: ./.github/actions/fetch-spec
        with:
          ssh-key: ${{ secrets.HUB_SPEC_DEPLOY_KEY }}
          ref: ${{ inputs.spec_ref || 'main' }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # Trusted publishing needs npm >= 11.5.1.
      - run: npm install -g npm@11.16.0

      - run: npm ci

      - name: Publish to npm
        run: npm publish
