name: Fetch Hub public API spec
description: >-
  Read-only, shallow + sparse checkout of the public API v2 OpenAPI spec from the
  private camunda/camunda-hub repo, using a least-privilege GitHub App token.

inputs:
  app-id:
    description: GitHub App ID. The app has Contents:read on camunda-hub only.
    required: true
  private-key:
    description: GitHub App private key (PEM).
    required: true
  ref:
    description: camunda-hub ref (branch, tag, or sha) to fetch the spec from.
    required: false
    default: main
  path:
    description: Directory to check the spec out into.
    required: false
    default: .spec-src

runs:
  using: composite
  steps:
    - name: Mint a short-lived, single-repo token
      id: token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        owner: camunda
        repositories: camunda-hub

    - name: Sparse + shallow checkout of the spec
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: camunda/camunda-hub
        ref: ${{ inputs.ref }}
        token: ${{ steps.token.outputs.token }}
        path: ${{ inputs.path }}
        fetch-depth: 1
        sparse-checkout: restapi/public-api/src/main/resources/openapi/v2
        sparse-checkout-cone-mode: false
        persist-credentials: false
