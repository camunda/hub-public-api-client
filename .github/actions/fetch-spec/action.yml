name: Fetch Hub public API spec
description: >-
  Shallow + sparse checkout of the public API v2 OpenAPI spec from the private
  camunda/camunda-hub repo, using a provided read token.

inputs:
  token:
    description: >-
      A token with read access to camunda-hub — a GitHub App installation token
      minted from Vault (see the workflow's
      generate-github-app-token-from-vault-secrets step).
    required: true
  ref:
    description: camunda-hub ref (branch, tag, or sha) to fetch the spec from.
    required: false
    default: main
  path:
    description: Directory to check the spec out into.
    required: false
    default: .spec-src

runs:
  using: composite
  steps:
    - name: Sparse + shallow checkout of the spec
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: camunda/camunda-hub
        ref: ${{ inputs.ref }}
        token: ${{ inputs.token }}
        path: ${{ inputs.path }}
        fetch-depth: 1
        sparse-checkout: restapi/public-api/src/main/resources/openapi/v2
        sparse-checkout-cone-mode: false
        persist-credentials: false
